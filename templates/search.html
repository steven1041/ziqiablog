{% extends "base.html" %}
{% block title %}{{ trans(key="search", lang=page_lang) }} — {{ site_title }}{% endblock title %}
{% block content %}
<div class="search-page">
  <input type="search" id="search-input" class="search-input" placeholder="{{ trans(key="search_placeholder", lang=page_lang) }}" aria-label="{{ trans(key="search", lang=page_lang) }}">
  <p id="search-hint" class="search-hint">{{ trans(key="search_hint", lang=page_lang) }}</p>
  <ul id="search-results" class="search-results"></ul>
</div>
<script>
const searchInput = document.getElementById('search-input');
const searchHint = document.getElementById('search-hint');
const searchResults = document.getElementById('search-results');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

(async () => {
  let pagefind;
  try {
    const mod = await import('/pagefind/pagefind.js');
    if (mod && typeof mod.search === 'function') pagefind = mod;
  } catch {}
  if (!pagefind) return;

  const doSearch = async () => {
    const q = searchInput.value.trim();
    if (!q) { searchResults.innerHTML = ''; searchHint.style.display = ''; return; }
    searchHint.style.display = 'none';
    const { results } = await pagefind.search(q);
    const slice = results.slice(0, 30);
    const items = await Promise.all(slice.map(async r => { const d = await r.data(); return d; }));
    const filtered = items.filter(d => d.url.startsWith('/{{ page_lang }}/'));
    searchResults.innerHTML = filtered.map(d =>
      `<li class="search-result"><a href="${d.url}"><div class="result-title">${escapeHtml(d.meta.title)}</div><div class="result-excerpt">${d.excerpt}</div></a></li>`
    ).join('');
    if (filtered.length === 0) searchResults.innerHTML = '<p class="search-hint">{{ trans(key="no_results", lang=page_lang) }}</p>';
  };

  searchInput.addEventListener('input', doSearch);
})();
</script>
{% endblock content %}
